<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar{background:var(--union-blue-dark);height:14px;border-radius:3px;}
.lbl{font-size:10px;color:#64748b;width:70px;}
</style></head>
<body>
<div class="row"><span class="lbl">space-1</span><div class="bar" style="width:var(--space-1)"></div></div>
<div class="row"><span class="lbl">space-2</span><div class="bar" style="width:var(--space-2)"></div></div>
<div class="row"><span class="lbl">space-3</span><div class="bar" style="width:var(--space-3)"></div></div>
<div class="row"><span class="lbl">space-4</span><div class="bar" style="width:var(--space-4)"></div></div>
<div class="row"><span class="lbl">space-6</span><div class="bar" style="width:var(--space-6)"></div></div>
<div class="row"><span class="lbl">space-8</span><div class="bar" style="width:var(--space-8)"></div></div>
<div class="row"><span class="lbl">space-12</span><div class="bar" style="width:var(--space-12)"></div></div>
<div class="row"><span class="lbl">space-16</span><div class="bar" style="width:var(--space-16)"></div></div>
</body></html>
