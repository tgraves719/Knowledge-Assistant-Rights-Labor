<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}

.hdr{height:100px;border-radius:12px;color:#fff;display:flex;align-items:center;padding:0 16px;font-weight:600;

background-size:100% 100%, 300% 300%;
animation:drift 14s linear infinite;}
</style></head>
<body>
<div class="hdr">Karl — Union Document Assistant</div>
