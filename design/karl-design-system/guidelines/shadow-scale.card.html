<!-- @dsCard group="Spacing" viewport="700x150" name="Shadow scale" subtitle="sm through 2xl, plus onboarding/widget shadows" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);}
.grid{display:flex;gap:20px;}
.sw{width:70px;height:70px;background:#fff;border-radius:12px;}
.lbl{font-size:9px;text-align:center;margin-top:8px;color:#64748b;}
</style></head>
<body>
<div class="grid">
  <div><div class="sw" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
  <div><div class="sw" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
  <div><div class="sw" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
  <div><div class="sw" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
  <div><div class="sw" style="box-shadow:var(--shadow-2xl)"></div><div class="lbl">2xl</div></div>
</div>
</body></html>
