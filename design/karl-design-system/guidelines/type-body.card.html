<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary);}
.row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
.tag{font-size:10px;color:#94a3b8;width:70px;flex-shrink:0;}
</style></head>
<body>
<div class="row"><span class="tag">2xl/700</span><span style="font-size:var(--text-2xl);font-weight:700;">Article 12 — Wages</span></div>
<div class="row"><span class="tag">lg/600</span><span style="font-size:var(--text-lg);font-weight:600;">Sunday Premium Pay</span></div>
<div class="row"><span class="tag">base/400</span><span style="font-size:var(--text-base);">Courtesy clerks earn a $1.50/hr premium for Sunday shifts.</span></div>
<div class="row"><span class="tag">sm/500</span><span style="font-size:var(--text-sm);font-weight:500;color:var(--text-secondary);">Ask Karl a follow-up question…</span></div>
<div class="row"><span class="tag">xs/700 upper</span><span style="font-size:var(--text-xs);font-weight:700;letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--union-gold);">Karl Member Widget</span></div>
</body></html>
