<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radius scale" subtitle="6px chips through 28px shells, and full pills" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.grid{display:flex;gap:12px;flex-wrap:wrap;}
.sw{width:72px;height:72px;background:var(--union-blue-dark);display:flex;align-items:flex-end;justify-content:center;color:#fff;font-size:9px;padding-bottom:4px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="border-radius:var(--radius-xs)">4px</div>
  <div class="sw" style="border-radius:var(--radius-sm)">6px</div>
  <div class="sw" style="border-radius:var(--radius-md)">8px</div>
  <div class="sw" style="border-radius:var(--radius-lg)">12px</div>
  <div class="sw" style="border-radius:var(--radius-xl)">16px</div>
  <div class="sw" style="border-radius:var(--radius-2xl)">24px</div>
  <div class="sw" style="border-radius:var(--radius-3xl)">28px</div>
  <div class="sw" style="border-radius:var(--radius-full)">pill</div>
</div>
</body></html>
