<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sw{border-radius:10px;height:64px;display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:600;}
.sw span{background:rgba(0,0,0,0.25);padding:2px 5px;border-radius:4px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--union-blue-dark)"><span>0D3B54</span></div>
  <div class="sw" style="background:var(--union-blue-mid)"><span>14506E</span></div>
  <div class="sw" style="background:var(--union-blue-light)"><span>1B6B8A</span></div>
  <div class="sw" style="background:var(--union-gold)"><span>D4A029</span></div>
  <div class="sw" style="background:var(--union-gold-light);color:#333"><span>E8B84A</span></div>
</div>
</body></html>
