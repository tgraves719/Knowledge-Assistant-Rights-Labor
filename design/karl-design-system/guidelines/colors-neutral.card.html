<!-- @dsCard group="Colors" viewport="700x160" name="Neutral (slate) scale" subtitle="Text, borders, surfaces — used everywhere" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px;}
.sw{border-radius:6px;height:56px;}
.lbl{font-size:9px;text-align:center;margin-top:4px;color:#64748b;}
</style></head>
<body>
<div class="grid">
  <div><div class="sw" style="background:var(--ink-50)"></div><div class="lbl">50</div></div>
  <div><div class="sw" style="background:var(--ink-100)"></div><div class="lbl">100</div></div>
  <div><div class="sw" style="background:var(--ink-200)"></div><div class="lbl">200</div></div>
  <div><div class="sw" style="background:var(--ink-300)"></div><div class="lbl">300</div></div>
  <div><div class="sw" style="background:var(--ink-400)"></div><div class="lbl">400</div></div>
  <div><div class="sw" style="background:var(--ink-500)"></div><div class="lbl">500</div></div>
  <div><div class="sw" style="background:var(--ink-600)"></div><div class="lbl">600</div></div>
  <div><div class="sw" style="background:var(--ink-700)"></div><div class="lbl">700</div></div>
  <div><div class="sw" style="background:var(--ink-800)"></div><div class="lbl">800</div></div>
  <div><div class="sw" style="background:var(--ink-900)"></div><div class="lbl">900</div></div>
  <div><div class="sw" style="background:var(--ink-950)"></div><div class="lbl">950</div></div>
</div>
</body></html>
