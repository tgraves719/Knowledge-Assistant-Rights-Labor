<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.sw{border-radius:10px;height:64px;display:flex;align-items:flex-end;padding:6px;font-size:10px;font-weight:600;border:1px solid #e2e8f0;}
.sw span{background:rgba(128,128,128,0.15);padding:2px 5px;border-radius:4px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#000;color:#fff"><span>#000000</span></div>
  <div class="sw" style="background:#fff;color:#000"><span>#FFFFFF</span></div>
</div>
</body></html>
