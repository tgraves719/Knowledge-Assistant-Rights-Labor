<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans);}
.row{margin-bottom:14px;max-width:420px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, EmploymentOption, Toggle } = window.KARLDesignSystem_3d3866;
function Demo() {
  const [sel, setSel] = React.useState('full');
  const [on, setOn] = React.useState(true);
  return (
    <div>
      <div className="row"><Input placeholder="Ask Karl a question…" /></div>
      <div className="row" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
        <EmploymentOption title="Full-time" subtitle="35+ hrs/week" selected={sel==='full'} onClick={()=>setSel('full')} />
        <EmploymentOption title="Part-time" subtitle="Under 35 hrs/week" selected={sel==='part'} onClick={()=>setSel('part')} />
      </div>
      <div className="row"><Toggle checked={on} onChange={setOn} label="Dark mode" /></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
