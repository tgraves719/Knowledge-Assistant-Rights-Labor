name: KARL Evaluation CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  setup-tooling-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies (profile)
        run: pip install -r requirements/base.txt

      - name: Validate setup helper scripts compile
        run: python -m py_compile scripts/karl.py scripts/dev_preflight.py

      - name: Run wrapper doctor (imports)
        run: python scripts/karl.py doctor --profile backend --check-imports --strict

      - name: Emit doctor JSON report
        run: python scripts/karl.py doctor --profile backend --json --output data/test_set/dev_preflight_ci_linux.json

      - name: Validate docker compose config
        run: docker compose -f docker-compose.dev.yml config

      - name: Upload setup tooling artifacts (linux)
        uses: actions/upload-artifact@v4
        with:
          name: setup-tooling-linux
          path: |
            data/test_set/dev_preflight_ci_linux.json

  setup-tooling-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python helper scripts compile
        run: python -m py_compile scripts/karl.py scripts/dev_preflight.py

      - name: Run doctor preflight (host)
        run: python scripts/karl.py doctor --profile backend --strict

      - name: Parse PowerShell setup/smoke scripts
        shell: powershell
        run: |
          [void][scriptblock]::Create((Get-Content 'scripts/bootstrap_windows.ps1' -Raw))
          [void][scriptblock]::Create((Get-Content 'scripts/smoke_local.ps1' -Raw))
          Write-Host 'PowerShell parse OK'

      - name: Validate wrapper setup (ui-only bootstrap path)
        shell: powershell
        run: python scripts/karl.py setup --profile ui-only --skip-preflight

      - name: Emit doctor JSON report (windows)
        run: python scripts/karl.py doctor --profile backend --json --output data/test_set/dev_preflight_ci_windows.json

      - name: Upload setup tooling artifacts (windows)
        uses: actions/upload-artifact@v4
        with:
          name: setup-tooling-windows
          path: |
            data/test_set/dev_preflight_ci_windows.json

  pr-core-eval:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate contract manifests
        run: python -m backend.validate_manifests

      - name: Run core v2 benchmark (canonical runner)
        run: python -m backend.evaluate_runner --track v2 --ablation-mode normal

      - name: Run escalation precision slice (canonical runner)
        run: python -m backend.evaluate_runner --track escalation

      - name: Run multi-contract slice (canonical runner)
        run: python -m backend.evaluate_runner --track v2_multi_contract

      - name: Run paraphrase slice (canonical runner)
        run: python -m backend.evaluate_runner --track paraphrase

      - name: Run adversarial formal-precedence slice (canonical runner)
        run: python -m backend.evaluate_runner --track adversarial

      - name: Run unanswerable multi-contract slice (canonical runner)
        run: python -m backend.evaluate_runner --track unanswerable

      - name: Run cross-contract mention slice (canonical runner)
        run: python -m backend.evaluate_runner --track cross_contract_mentions

      - name: Validate adversarial dataset coverage
        run: python -m backend.validate_adversarial_dataset

      - name: Validate unanswerable dataset coverage
        run: python -m backend.validate_unanswerable_dataset

      - name: Validate cross-contract mention dataset coverage
        run: python -m backend.validate_cross_contract_mentions_dataset

      - name: Validate false-unavailable dataset coverage
        run: python -m backend.validate_false_unavailable_dataset

      - name: Run false-unavailable guard slice (canonical runner)
        run: python -m backend.evaluate_runner --track false_unavailable

      - name: Run MOA deleted-vs-updated regression slice (canonical runner)
        run: python -m backend.evaluate_runner --track moa_deleted_vs_updated

      - name: Run MOA deleted-vs-updated answer regression slice (canonical runner)
        run: python -m backend.evaluate_runner --track moa_deleted_vs_updated_answer

      - name: Run needle slice (canonical runner)
        run: python -m backend.evaluate_runner --track needle

      - name: Run follow-up role wage slice (canonical runner)
        run: python -m backend.evaluate_runner --track followup_role_wage

      - name: Run contract isolation checks
        run: python -m backend.test_contract_isolation

      - name: Run deterministic topic routing checks
        run: python backend/test_topic_routing.py

      - name: Run cross-contamination evaluator
        run: python -m backend.evaluate_cross_contamination

      - name: Run canonical v3 suite summary (from artifacts)
        run: python -m backend.evaluate_v3 --from-artifacts --bm25-only

      - name: Run v0.9.0 readiness scorecard (artifact mode)
        run: python -m backend.evaluate_release_090 --skip-track-all-metadata

      - name: Enforce release-gate thresholds
        run: |
          python -m backend.evaluate_gate_check \
            --v2-results data/test_set/comprehensive_results.json \
            --escalation-results data/test_set/escalation_precision_results.json \
            --cross-contamination-results data/test_set/cross_contamination_results.json \
            --v3-results data/test_set/v3_results.json \
            --adversarial-results data/test_set/adversarial_results.json \
            --unanswerable-results data/test_set/unanswerable_results.json \
            --cross-contract-mentions-results data/test_set/cross_contract_mentions_results.json \
            --followup-role-wage-results data/test_set/followup_role_wage_results.json \
            --moa-deleted-vs-updated-results data/test_set/moa_deleted_vs_updated_results.json \
            --min-v2-accuracy 0.80 \
            --min-escalation-precision 0.90 \
            --min-escalation-recall 0.70 \
            --max-escalation-fpr 0.10 \
            --min-v3-components-pass-rate 1.00 \
            --min-multi-contract-accuracy 0.80 \
            --min-multi-contract-per-contract 0.75 \
            --min-paraphrase-family-pass-rate 0.85 \
            --min-paraphrase-worker-slang-pass-rate 0.80 \
            --min-paraphrase-formal-rewrite-pass-rate 0.90 \
            --required-adversarial-dataset-schema-version adversarial_precedence_test_v1 \
            --min-adversarial-total-cases 12 \
            --min-adversarial-cases-per-contract 3 \
            --min-adversarial-pass-rate 0.90 \
            --min-adversarial-per-contract 0.80 \
            --min-adversarial-precedence-pass-rate 0.90 \
            --required-unanswerable-dataset-schema-version unanswerable_multi_contract_test_v1 \
            --min-unanswerable-total-cases 12 \
            --min-unanswerable-cases-per-contract 3 \
            --min-unanswerable-scenario-types 3 \
            --min-unanswerable-pass-rate 0.90 \
            --min-unanswerable-per-contract 0.80 \
            --required-cross-contract-mentions-dataset-schema-version cross_contract_mentions_test_v1 \
            --min-cross-contract-mentions-total-cases 9 \
            --min-cross-contract-mentions-cases-per-contract 3 \
            --min-cross-contract-mentions-pass-rate 0.90 \
            --min-cross-contract-mentions-per-contract 0.80 \
            --min-cross-contract-mentions-no-citation-rate 0.90 \
            --required-false-unavailable-dataset-schema-version false_unavailable_test_v1 \
            --min-false-unavailable-total-cases 12 \
            --min-false-unavailable-recover-cases 9 \
            --min-false-unavailable-uncertain-cases 3 \
            --min-false-unavailable-cases-per-contract 3 \
            --min-false-unavailable-pass-rate 0.90 \
            --min-false-unavailable-per-contract 0.80 \
            --min-false-unavailable-recovered-rate 0.90 \
            --min-false-unavailable-proper-uncertainty-rate 0.90 \
            --required-followup-role-wage-dataset-schema-version followup_role_wage_test_v1 \
            --min-followup-role-wage-total-cases 12 \
            --min-followup-role-wage-cases-per-contract 3 \
            --min-followup-role-wage-pass-rate 0.90 \
            --min-followup-role-wage-per-contract 0.80 \
            --min-followup-role-wage-target-resolution-rate 0.95 \
            --min-followup-role-wage-table-evidence-presence-rate 0.95 \
            --min-followup-role-wage-appendix-citation-rate 0.95 \
            --min-followup-role-wage-intent-wage-rate 0.95 \
            --min-followup-role-wage-no-unavailable-rate 0.95 \
            --min-followup-role-wage-explicit-override-rate 0.90 \
            --min-followup-role-wage-profile-fallback-rate 0.90 \
            --required-moa-deleted-vs-updated-schema-version moa_deleted_vs_updated_eval_v1 \
            --required-moa-deleted-vs-updated-dataset-schema-version moa_deleted_vs_updated_test_v1 \
            --min-moa-deleted-vs-updated-overall-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-updated-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-deleted-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-updated-moa-source-type-match-rate 1.00 \
            --min-needle-pass-rate 0.80 \
            --min-needle-position-pass-rate 0.80

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-eval-artifacts
          path: |
            data/test_set/comprehensive_results*.json
            data/test_set/escalation_precision_results.json
            data/test_set/cross_contamination_results.json
            data/test_set/v3_results.json
            data/test_set/multi_contract_v2_results.json
            data/test_set/paraphrase_results.json
            data/test_set/adversarial_results.json
            data/test_set/unanswerable_results.json
            data/test_set/cross_contract_mentions_results.json
            data/test_set/false_unavailable_results.json
            data/test_set/needle_results.json
            data/test_set/followup_role_wage_results.json
            data/test_set/moa_effective_results.json
            data/test_set/moa_deleted_vs_updated_results.json
            data/test_set/moa_deleted_vs_updated_answer_results.json
            data/test_set/moa_effective_deep_results.json
            data/test_set/moa_readiness_results.json
            data/test_set/moa_deep_eval_suite_results.json
            data/test_set/moa_deep_eval_summary.md
            data/test_set/release_0_9_0_scorecard.json
            data/test_set/eval_run_metadata*.json

  pr-moa-release-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate contract manifests
        run: python -m backend.validate_manifests

      - name: Run MOA deep release gate (canonical runner)
        run: python -m backend.evaluate_runner --track moa_deep_suite

      - name: Upload MOA gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-moa-gate-artifacts
          path: |
            data/test_set/moa_effective_results.json
            data/test_set/moa_deleted_vs_updated_results.json
            data/test_set/moa_deleted_vs_updated_answer_results.json
            data/test_set/moa_effective_deep_results.json
            data/test_set/moa_readiness_results.json
            data/test_set/moa_deep_eval_suite_results.json
            data/test_set/moa_deep_eval_summary.md
            data/test_set/eval_run_metadata*.json

  main-full-v2-suite:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - normal
          - no_retrieval
          - random
          - top1
          - no_hypothesis
          - bm25_only
          - vector_only
          - no_expansion
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate contract manifests
        run: python -m backend.validate_manifests

      - name: Run v2 suite mode
        run: python -m backend.evaluate_runner --track v2 --ablation-mode ${{ matrix.mode }}

      - name: Upload v2 suite artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-v2-${{ matrix.mode }}
          path: |
            data/test_set/comprehensive_results*.json
            data/test_set/eval_run_metadata*.json

  main-escalation-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate contract manifests
        run: python -m backend.validate_manifests

      - name: Run v2 + deterministic release slices
        run: |
          python -m backend.evaluate_runner --track v2 --ablation-mode normal
          python -m backend.evaluate_runner --track escalation
          python -m backend.evaluate_runner --track v2_multi_contract
          python -m backend.evaluate_runner --track paraphrase
          python -m backend.evaluate_runner --track adversarial
          python -m backend.evaluate_runner --track unanswerable
          python -m backend.evaluate_runner --track cross_contract_mentions
          python -m backend.validate_adversarial_dataset
          python -m backend.validate_unanswerable_dataset
          python -m backend.validate_cross_contract_mentions_dataset
          python -m backend.validate_false_unavailable_dataset
          python -m backend.evaluate_runner --track false_unavailable
          python -m backend.evaluate_runner --track moa_deleted_vs_updated_answer
          python -m backend.evaluate_runner --track needle
          python -m backend.evaluate_runner --track followup_role_wage
          python -m backend.evaluate_runner --track moa_deep_suite

      - name: Run cross-contamination evaluator
        run: python -m backend.evaluate_cross_contamination

      - name: Run canonical v3 suite summary (from artifacts)
        run: python -m backend.evaluate_v3 --from-artifacts --bm25-only

      - name: Run v0.9.0 readiness scorecard (artifact mode)
        run: python -m backend.evaluate_release_090 --skip-track-all-metadata

      - name: Run deterministic topic routing checks
        run: python backend/test_topic_routing.py

      - name: Enforce release-gate thresholds
        run: |
          python -m backend.evaluate_gate_check \
            --v2-results data/test_set/comprehensive_results.json \
            --escalation-results data/test_set/escalation_precision_results.json \
            --cross-contamination-results data/test_set/cross_contamination_results.json \
            --v3-results data/test_set/v3_results.json \
            --adversarial-results data/test_set/adversarial_results.json \
            --unanswerable-results data/test_set/unanswerable_results.json \
            --cross-contract-mentions-results data/test_set/cross_contract_mentions_results.json \
            --followup-role-wage-results data/test_set/followup_role_wage_results.json \
            --moa-deleted-vs-updated-results data/test_set/moa_deleted_vs_updated_results.json \
            --min-v2-accuracy 0.80 \
            --min-escalation-precision 0.90 \
            --min-escalation-recall 0.70 \
            --max-escalation-fpr 0.10 \
            --min-v3-components-pass-rate 1.00 \
            --min-multi-contract-accuracy 0.80 \
            --min-multi-contract-per-contract 0.75 \
            --min-paraphrase-family-pass-rate 0.85 \
            --min-paraphrase-worker-slang-pass-rate 0.80 \
            --min-paraphrase-formal-rewrite-pass-rate 0.90 \
            --required-adversarial-dataset-schema-version adversarial_precedence_test_v1 \
            --min-adversarial-total-cases 12 \
            --min-adversarial-cases-per-contract 3 \
            --min-adversarial-pass-rate 0.90 \
            --min-adversarial-per-contract 0.80 \
            --min-adversarial-precedence-pass-rate 0.90 \
            --required-unanswerable-dataset-schema-version unanswerable_multi_contract_test_v1 \
            --min-unanswerable-total-cases 12 \
            --min-unanswerable-cases-per-contract 3 \
            --min-unanswerable-scenario-types 3 \
            --min-unanswerable-pass-rate 0.90 \
            --min-unanswerable-per-contract 0.80 \
            --required-cross-contract-mentions-dataset-schema-version cross_contract_mentions_test_v1 \
            --min-cross-contract-mentions-total-cases 9 \
            --min-cross-contract-mentions-cases-per-contract 3 \
            --min-cross-contract-mentions-pass-rate 0.90 \
            --min-cross-contract-mentions-per-contract 0.80 \
            --min-cross-contract-mentions-no-citation-rate 0.90 \
            --required-false-unavailable-dataset-schema-version false_unavailable_test_v1 \
            --min-false-unavailable-total-cases 12 \
            --min-false-unavailable-recover-cases 9 \
            --min-false-unavailable-uncertain-cases 3 \
            --min-false-unavailable-cases-per-contract 3 \
            --min-false-unavailable-pass-rate 0.90 \
            --min-false-unavailable-per-contract 0.80 \
            --min-false-unavailable-recovered-rate 0.90 \
            --min-false-unavailable-proper-uncertainty-rate 0.90 \
            --required-followup-role-wage-dataset-schema-version followup_role_wage_test_v1 \
            --min-followup-role-wage-total-cases 12 \
            --min-followup-role-wage-cases-per-contract 3 \
            --min-followup-role-wage-pass-rate 0.90 \
            --min-followup-role-wage-per-contract 0.80 \
            --min-followup-role-wage-target-resolution-rate 0.95 \
            --min-followup-role-wage-table-evidence-presence-rate 0.95 \
            --min-followup-role-wage-appendix-citation-rate 0.95 \
            --min-followup-role-wage-intent-wage-rate 0.95 \
            --min-followup-role-wage-no-unavailable-rate 0.95 \
            --min-followup-role-wage-explicit-override-rate 0.90 \
            --min-followup-role-wage-profile-fallback-rate 0.90 \
            --required-moa-deleted-vs-updated-schema-version moa_deleted_vs_updated_eval_v1 \
            --required-moa-deleted-vs-updated-dataset-schema-version moa_deleted_vs_updated_test_v1 \
            --min-moa-deleted-vs-updated-overall-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-updated-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-deleted-pass-rate 1.00 \
            --min-moa-deleted-vs-updated-updated-moa-source-type-match-rate 1.00 \
            --min-needle-pass-rate 0.80 \
            --min-needle-position-pass-rate 0.80

      - name: Upload gate-check artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-gate-check
          path: |
            data/test_set/comprehensive_results*.json
            data/test_set/escalation_precision_results.json
            data/test_set/cross_contamination_results.json
            data/test_set/v3_results.json
            data/test_set/multi_contract_v2_results.json
            data/test_set/paraphrase_results.json
            data/test_set/adversarial_results.json
            data/test_set/unanswerable_results.json
            data/test_set/cross_contract_mentions_results.json
            data/test_set/false_unavailable_results.json
            data/test_set/needle_results.json
            data/test_set/followup_role_wage_results.json
            data/test_set/moa_effective_results.json
            data/test_set/moa_deleted_vs_updated_results.json
            data/test_set/moa_deleted_vs_updated_answer_results.json
            data/test_set/moa_effective_deep_results.json
            data/test_set/moa_readiness_results.json
            data/test_set/moa_deep_eval_suite_results.json
            data/test_set/moa_deep_eval_summary.md
            data/test_set/release_0_9_0_scorecard.json
            data/test_set/eval_run_metadata*.json
